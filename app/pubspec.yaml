name: triplesapp
description: "Basketball app - encontrá tu próxima cancha."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.10.0
  google_maps_flutter_android: 2.19.7  # 2.19.8 migró a Kotlin Pigeon y rompe el build (cannot find symbol PlatformPolygon)
  google_maps_flutter_platform_interface: any
  http: ^1.2.0
  geolocator: ^13.0.0
  android_alarm_manager_plus: ^4.0.4
  battery_plus: ^6.0.0
  shared_preferences: ^2.3.0
  crypto: ^3.0.3
  provider: ^6.1.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^19.0.0
  native_geofence: ^1.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  health: ^13.3.1
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  google_sign_in: ^6.2.2
  url_launcher: ^6.3.0  # abrir el cliente de mail para reportar contenido / contacto de soporte

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.1

# Ícono del launcher generado desde el logo de marca (assets/branding/ trae las
# fuentes cuadradas; regenerar con: dart run flutter_launcher_icons).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/icon_legacy.png
  # Mismo azul índigo que el fondo del loader (AppColors.lilac).
  adaptive_icon_background: "#1E1B4B"
  adaptive_icon_foreground: assets/branding/icon_foreground.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Jost
      fonts:
        - asset: assets/fonts/jost/Jost-400-Book.otf
          weight: 400
        - asset: assets/fonts/jost/Jost-400-BookItalic.otf
          weight: 400
          style: italic
        - asset: assets/fonts/jost/Jost-500-Medium.otf
          weight: 500
        - asset: assets/fonts/jost/Jost-600-Semi.otf
          weight: 600
        - asset: assets/fonts/jost/Jost-700-Bold.otf
          weight: 700
        - asset: assets/fonts/jost/Jost-700-BoldItalic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/jost/Jost-800-Hevy.otf
          weight: 800
        - asset: assets/fonts/jost/Jost-900-Black.otf
          weight: 900
